default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
        # mkdocs.yml uses MkDocs Material's Python YAML tags (!!python/name:...),
        # which the safe loader in check-yaml cannot construct.
        exclude: ^mkdocs\.yml$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        files: '\.md$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        files: '^plugins/(local-rag|memory|runtime-evidence|context-handoff|plugin-forge)/.*\.py$'
      - id: ruff-format
        files: '^plugins/(local-rag|memory|runtime-evidence|context-handoff|plugin-forge)/.*\.py$'

  - repo: local
    hooks:
      - id: check-manifests
        name: plugin.json ⇆ apm.yml manifest sync
        entry: bash plugins/plugin-forge/scripts/check-manifests.sh
        language: system
        pass_filenames: false
        files: '^plugins/.*/(\.claude-plugin/plugin\.json|apm\.yml)$'
      - id: check-release-readiness
        name: shipped plugin release readiness
        entry: bash plugins/plugin-forge/scripts/check-release-readiness.sh
        language: system
        pass_filenames: false
        always_run: true
        files: '^(\.claude-plugin/marketplace\.json|plugins/.+)'
      - id: test-release-readiness
        name: release readiness regression tests
        entry: bash plugins/plugin-forge/scripts/test-release-readiness.sh
        language: system
        pass_filenames: false
        files: '^plugins/plugin-forge/(scripts/(release_readiness\.py|check-release-readiness\.sh|test-release-readiness\.sh)|tests/test_release_readiness\.py)$'
      - id: check-skills
        name: skill/agent discovery frontmatter
        entry: bash plugins/plugin-forge/scripts/check-skills.sh
        language: system
        pass_filenames: false
        files: '^plugins/.*/(SKILL\.md|agents/.*\.md)$'
      - id: check-catalog-quality
        name: aggregate catalog discovery quality
        entry: bash plugins/plugin-forge/scripts/check-catalog-quality.sh
        language: system
        pass_filenames: false
        files: '^(plugins/.*/(SKILL\.md|agents/.*\.md)|plugins/plugin-forge/(quality/.*\.json|scripts/(catalog_quality\.py|check-catalog-quality\.sh)))$'
      - id: test-catalog-quality
        name: catalog quality and workflow smoke tests
        entry: bash plugins/plugin-forge/scripts/test-catalog-quality.sh
        language: system
        pass_filenames: false
        files: '^(plugins/.*/(SKILL\.md|agents/.*\.md)|plugins/plan-execute/workflows/plan-big-execute-small\.workflow\.js|plugins/plugin-forge/(quality/.*\.json|scripts/(catalog_quality\.py|test-catalog-quality\.sh)|tests/.*))$'
