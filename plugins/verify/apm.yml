# Agent Package Manager (APM) manifest — https://github.com/microsoft/apm
# Lets APM users install this plugin alongside the Claude Code / GitHub Copilot
# flows: `apm install verify@context-kit`. There is no `.apm/`
# directory, so the plugin-native layout (.claude-plugin/plugin.json + skills/)
# stays authoritative; APM consumes it as a plugin collection.
# Keep name/version in sync with .claude-plugin/plugin.json; description is a
# concise APM/CLI listing variant.
name: verify
version: 0.1.1
description: Read-only claim verification with per-claim verdicts and file:line evidence.
author: Mark Beacom
license: MIT
homepage: https://github.com/mbeacom/context-kit
repository: https://github.com/mbeacom/context-kit
keywords: [verification, review, read-only, subagent, trust, claims, evidence, claude-code, copilot]

dependencies:
  apm:
    # verify composes with the retrieval-core spine. This mirrors the
    # plugin.json "dependencies": ["retrieval-core"] — APM does not read that
    # Claude field, so the dependency is declared here as a sibling local path.
    # APM resolves it inside the same repo, so installing verify also deploys the
    # retrieval-strategist agent + retrieval-strategy skill.
    - path: ../retrieval-core
