# Agent Package Manager (APM) manifest — https://github.com/microsoft/apm
# Lets APM users install this plugin alongside the Claude Code / GitHub Copilot
# flows: `apm install obsidian@context-kit`. There is no `.apm/`
# directory, so the plugin-native layout (.claude-plugin/plugin.json + skills/)
# stays authoritative; APM consumes it as a plugin collection.
# Keep name/version/description in sync with .claude-plugin/plugin.json.
#
# This is a skill-only RAG bridge that feeds local-rag; it degrades gracefully
# without it, so no hard apm dependency is declared. Set the vault path via
# CONTEXT_KIT_OBSIDIAN_VAULT (apm has no Claude userConfig). See docs/APM.md.
name: obsidian
version: 0.1.4
description: Skill-only RAG bridge — turn an Obsidian vault's graph and tags into a candidate set fed to local-rag.
author: Mark Beacom
license: MIT
homepage: https://github.com/mbeacom/context-kit
repository: https://github.com/mbeacom/context-kit
keywords: [obsidian, notes, knowledge-base, graph, rag, retrieval]
