name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace manifest
        run: claude plugin validate . --strict
      - name: Validate plugins
        run: |
          for p in plugins/*/; do
            if [ -f "$p/.claude-plugin/plugin.json" ]; then
              echo "::group::validate $p"
              claude plugin validate "$p" --strict
              echo "::endgroup::"
            fi
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install OpenBLAS (turbovec native dependency)
        # turbovec's Linux extension references cblas symbols (cblas_sgemm) that
        # are not bundled; provide a system OpenBLAS and preload it so the
        # dynamic loader resolves them at import time.
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Run local-rag tests
        working-directory: plugins/local-rag
        run: |
          LIB="$(ldconfig -p | awk '/libopenblas\.so/ {print $NF; exit}')"
          echo "Preloading OpenBLAS: ${LIB:-<none found>}"
          LD_PRELOAD="$LIB" uv run --group dev pytest -q
